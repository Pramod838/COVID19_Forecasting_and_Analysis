# Data paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"
  
# Datasets
urls:
  covid_confirmed: "https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/csse_covid_19_data/csse_covid_19_time_series/time_series_covid19_confirmed_global.csv"
  covid_deaths: "https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/csse_covid_19_data/csse_covid_19_time_series/time_series_covid19_deaths_global.csv"
  covid_recovered: "https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/csse_covid_19_data/csse_covid_19_time_series/time_series_covid19_recovered_global.csv"
  mobility: "https://www.gstatic.com/covid19/mobility/Global_Mobility_Report.csv"
  
# Geographic focus
focus_states:
  - "Maharashtra"
  - "Delhi"
  - "Karnataka"
  - "Tamil Nadu"
  - "Kerala"
  - "Uttar Pradesh"
  - "West Bengal"
  - "Gujarat"

# Model parameters
models:
  # Prophet parameters
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    holidays_prior_scale: 10.0
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    
  # LSTM parameters
  lstm:
    sequence_length: 14
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    patience: 15
    
  # XGBoost parameters
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "reg:squarederror"
    
  # Ensemble parameters
  ensemble:
    prophet_weight: 0.3
    lstm_weight: 0.4
    xgboost_weight: 0.3

# Feature engineering
features:
  lag_days: [1, 3, 7, 14]
  rolling_windows: [3, 7, 14]
  
# Training
split:
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# Evaluation
metrics:
  - "mae"
  - "rmse"
  - "mape"
  - "mda"
